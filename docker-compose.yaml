services:
  back-end:
    hostname: back-end
    build:
      context: .
      dockerfile: ./back-end/Dockerfile
    restart: on-failure
    depends_on:
      - postgres
    volumes:
      - ./back-end:/home/root/app
      - private_node_modules:/home/root/app/node_modules
    ports:
      - 3000:3000
    env_file:
      - ./back-end/.env
    environment:
      - OTEL_SERVICE_NAME=eazy-ticket-back-end
    networks:
      - internal
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "0.25"
    #       memory: 256M

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - internal

  front-end:
    build:
      context: .
      dockerfile: ./front-end/Dockerfile
    restart: on-failure
    depends_on:
      - back-end
    ports:
      - 8080:80
    env_file:
      - ./front-end/.env
    networks:
      - internal

  prometheus:
    image: prom/prometheus:latest
    restart: on-failure
    depends_on:
      - back-end
    ports:
      - 9090:9090
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus:/prometheus
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    restart: on-failure
    depends_on:
      - prometheus
      - tempo
      - loki
    ports:
      - 3001:3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal

  tempo:
    image: grafana/tempo:latest
    restart: on-failure
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - 3200:3200
      - 4317:4317
      - 4318:4318
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo:/var/tempo
    networks:
      - internal

  loki:
    image: grafana/loki:latest
    restart: on-failure
    user: "0"
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - 3100:3100
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki:/var/loki
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres:
  prometheus:
  grafana:
  tempo:
  loki:
  private_node_modules: